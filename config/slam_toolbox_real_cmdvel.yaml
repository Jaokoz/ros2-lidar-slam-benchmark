slam_toolbox:
  ros__parameters:
    use_sim_time: false

    # Ramki
    odom_frame: odom
    map_frame: map
    base_frame: world_1
    scan_topic: /scan_fullframe

    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Ogólne
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.05
    map_update_interval: 1.0
    resolution: 0.05
    max_laser_range: 2.5
    minimum_time_interval: 0.05
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # Scan matching
    use_scan_matching: true
    use_scan_barycenter: false

    # Mniejsze progi, żeby nie gubił krótkich ruchów
    minimum_travel_distance: 0.02
    minimum_travel_heading: 0.02

    # Bufor skanów
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 3.0

    # Dopasowanie lokalne
    link_match_minimum_response_fine: 0.05
    link_scan_maximum_distance: 1.0

    # Na testy realne wyłącz loop closure,
    # żeby nie ściągał trajektorii przy małym pokoju
    do_loop_closing: false
    loop_search_maximum_distance: 2.0
    loop_match_minimum_chain_size: 5
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.45
    loop_match_minimum_response_fine: 0.55

    # Okno korelacji lokalnej
    correlation_search_space_dimension: 0.3
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.05

    # Okno loop closure — zostaje, ale loop closing jest wyłączony
    loop_search_space_dimension: 4.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Kary — większa kara dystansu ma ograniczyć skracanie/przeskoki dopasowania
    distance_variance_penalty: 1.0
    angle_variance_penalty: 1.0

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.1745
    coarse_angle_resolution: 0.01745

    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.8

    use_response_expansion: false
